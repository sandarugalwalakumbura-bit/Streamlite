<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .movie-card:hover .play-overlay { opacity: 1; }
    </style>
    <title>StreamLite | Drive-Based Cinema</title>
</head>
<body class="bg-black text-gray-100 antialiased">

    <nav class="sticky top-0 z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-red-600 to-orange-400 rounded-lg shadow-lg shadow-red-500/20"></div>
            <span class="text-xl font-extrabold tracking-tighter italic">STREAM<span class="text-red-500">LITE</span></span>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-white transition">Trending</a>
            <a href="#" class="hover:text-white transition">Data Saver Picks</a>
            <a href="#" class="hover:text-white transition">Requests</a>
        </div>
        <button class="bg-white text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-red-500 hover:text-white transition-all shadow-lg shadow-white/5">
            Upload Link
        </button>
    </nav>

    <section class="relative h-[400px] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-red-900/20 to-black z-0"></div>
        <div class="relative z-10 text-center px-4">
            <h2 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">Cinema in <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">Miniature.</span></h2>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" placeholder="Search for ultra-compressed movies..." 
                       class="w-full bg-white/10 border border-white/10 rounded-2xl py-4 px-6 focus:ring-2 focus:ring-red-500 outline-none backdrop-blur-md transition-all text-lg">
                <button class="absolute right-3 top-3 bg-red-600 px-4 py-1.5 rounded-xl font-bold hover:bg-red-700 transition">Search</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-6 py-12">
        
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-2xl font-semibold">Latest Uploads</h3>
            <div class="h-[1px] flex-grow mx-6 bg-gray-800 hidden sm:block"></div>
            <span class="text-red-500 text-sm font-bold cursor-pointer uppercase tracking-widest">View All</span>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            
            <div class="movie-card group cursor-pointer">
                <div class="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=400&q=80" 
                         alt="Poster" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    
                    <div class="play-overlay absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
                        <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center mb-4 transform translate-y-4 group-hover:translate-y-0 transition-transform">
                            <svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <span class="text-xs font-bold tracking-widest uppercase">Drive Link Only</span>
                    </div>

                    <div class="absolute top-3 left-3 px-3 py-1 bg-green-500/90 text-[10px] font-black rounded-lg backdrop-blur-sm">
                        240MB <span class="opacity-70">| 480P</span>
                    </div>
                </div>
                <h4 class="font-bold text-lg group-hover:text-red-500 transition-colors truncate">Project Nebula</h4>
                <p class="text-gray-500 text-xs font-medium uppercase tracking-tighter">Sci-Fi • 2024</p>
            </div>

            <div class="movie-card group cursor-pointer">
                <div class="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=400&q=80" 
                         alt="Poster" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="play-overlay absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
                        <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center mb-4 transform translate-y-4 group-hover:translate-y-0 transition-transform">
                            <svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="absolute top-3 left-3 px-3 py-1 bg-blue-500/90 text-[10px] font-black rounded-lg backdrop-blur-sm">
                        310MB <span class="opacity-70">| HEVC</span>
                    </div>
                </div>
                <h4 class="font-bold text-lg group-hover:text-red-500 transition-colors truncate">Lost in Code</h4>
                <p class="text-gray-500 text-xs font-medium uppercase tracking-tighter">Thriller • 2025</p>
            </div>

        </div>
    </main>

    <footer class="mt-20 border-t border-white/5 py-10 glass text-center">
        <p class="text-gray-500 text-sm">Powered by Google Drive Storage. Use responsibly.</p>
    </footer>

</body>
</html>
